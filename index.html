<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电影情绪包</title>
<style>
    body {
        margin: 0;
        font-family: "PingFang SC", Arial, sans-serif;
        background: linear-gradient(135deg, #1e1e2f, #2c3e50);
        color: white;
        text-align: center;
    }

    .container {
        padding: 40px 20px;
    }

    h1 {
        margin-bottom: 30px;
        font-size: 28px;
    }

    input {
        padding: 10px;
        width: 60%;
        max-width: 300px;
        border-radius: 20px;
        border: none;
        outline: none;
        font-size: 16px;
    }

    button {
        margin: 10px;
        padding: 10px 20px;
        border-radius: 20px;
        border: none;
        background-color: #ff6b81;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #ff4757;
        transform: scale(1.05);
    }

    .emotion-grid {
        margin-top: 30px;
    }

    .hidden {
        display: none;
    }

    .back-btn {
        background-color: #57606f;
    }

</style>
</head>
<body>

<div class="container" id="home">
    <h1>🎬 电影情绪包</h1>

    <input type="text" id="emotionInput" placeholder="输入你的情绪...">
    <br>
    <button onclick="goToEmotion()">进入</button>

    <div class="emotion-grid">
        <button onclick="showEmotion('开心')">开心</button>
        <button onclick="showEmotion('愤怒')">愤怒</button>
        <button onclick="showEmotion('忧郁')">忧郁</button>
        <button onclick="showEmotion('悲伤')">悲伤</button>
        <button onclick="showEmotion('孤独')">孤独</button>
        <button onclick="showEmotion('温暖')">温暖</button>
        <button onclick="showEmotion('轻松')">轻松</button>
    </div>
</div>

<div class="container hidden" id="emotionPage">
    <h1 id="emotionTitle"></h1>
    <p style="margin-top:30px;font-size:18px;">内容即将呈现...</p>
    <button class="back-btn" onclick="goBack()">返回</button>
</div>

<script>
    const emotions = ["开心", "愤怒", "忧郁", "悲伤", "孤独", "温暖", "轻松"];

    function goToEmotion() {
        const input = document.getElementById("emotionInput").value.trim();
        if (emotions.includes(input)) {
            showEmotion(input);
        } else {
            alert("暂未收录该情绪，请选择已有情绪");
        }
    }

    function showEmotion(emotion) {
        document.getElementById("home").classList.add("hidden");
        document.getElementById("emotionPage").classList.remove("hidden");
        document.getElementById("emotionTitle").innerText = emotion + " · 情绪电影片段";
    }

    function goBack() {
        document.getElementById("emotionPage").classList.add("hidden");
        document.getElementById("home").classList.remove("hidden");
    }
</script>

</body>
</html>
